<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Stay &amp; Food Finder | Login</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">
  <meta name="description" content="Admin login for Student Stay &amp; Food Finder.">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ── NAVBAR ──────────────────────────────────────────── -->
  <header class="navbar">
    <div class="logo-wrapper">
      <h1 onclick="window.location.href='index.html'">Student Utility Finder</h1>
    </div>
    <nav class="nav-links">
      <a href="index.html" class="active">Explore</a>
    </nav>
  </header>

  <main>
    <div class="login-page-wrapper">
      <div class="login-card">
        <h2>Welcome Back 👋</h2>
        <p class="login-sub">Sign in to access the admin panel.</p>

        <form id="loginForm" class="modern-form">
          <div class="form-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              class="form-input"
              placeholder="user@gmail.com"
              required
            >
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              class="form-input"
              placeholder="Enter your password"
              required
            >
          </div>

          <button type="submit" class="btn-submit" style="margin-top:.5rem;">Login</button>
        </form>

        <p style="text-align:center; margin-top:1.25rem; font-size:.875rem; color:var(--text-muted);">
          <a href="index.html" style="color:var(--primary); text-decoration:none; font-weight:600;">
            ← Back to Explore
          </a>
        </p>
      </div>
    </div>
  </main>

  <script src="login.js"></script>
</body>
</html>
