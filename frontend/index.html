<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Stay & Food Finder | Find Your Perfect Stay</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">
  <meta name="description" content="Find the best PGs, Hostels, Apartments, Messes, and Budget Restaurants tailored for students near your college.">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ── NAVBAR ──────────────────────────────────────────── -->
  <header class="navbar">
    <div class="logo-wrapper">
      <h1 onclick="window.location.href='index.html'">Student Utility Finder</h1>
    </div>
    <nav class="nav-links">
      <a href="index.html" class="active">Explore</a>
      <a href="login.html" class="login-link">Login</a>
      <a href="admin.html" class="admin-btn">Admin Panel</a>
      <button onclick="logout()" class="logout-btn" style="display:none;">Logout</button>
    </nav>
  </header>

  <main>

    <!-- ── HERO ────────────────────────────────────────────── -->
    <section class="hero-section">
      <div class="hero-content">
        <h2 class="hero-title">Find the Best Stay Near Your College</h2>
        <p class="hero-subtitle">PGs, Mess, Restaurants — all in one place</p>

        <!-- Search Bar Design -->
        <div class="search-pill">
          <input type="text" id="searchInput" class="search-input" placeholder="Search by name or location...">
          <div class="divider"></div>
          
          <div class="custom-dropdown" id="customDistanceDropdown">
            <div class="dropdown-selected" onclick="toggleDropdown()">
              <span id="dropdownSelectedText">Any Distance</span>
              <svg class="dropdown-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
            </div>
            <div class="dropdown-options" id="dropdownOptions">
              <div class="dropdown-option" onclick="setDistance('', 'Any Distance')">Any Distance</div>
              <div class="dropdown-option" onclick="setDistance('1', 'Within 1 km')">Within 1 km</div>
              <div class="dropdown-option" onclick="setDistance('2', 'Within 2 km')">Within 2 km</div>
              <div class="dropdown-option" onclick="setDistance('5', 'Within 5 km')">Within 5 km</div>
            </div>
          </div>
          <!-- Hidden original select to maintain script.js functionality -->
          <select id="distanceFilter" style="display:none;">
            <option value="">Any Distance</option>
            <option value="1">Within 1 km</option>
            <option value="2">Within 2 km</option>
            <option value="5">Within 5 km</option>
          </select>
          
          <button type="button" class="btn-search" onclick="applyFilters()">Search</button>
        </div>
      </div>
    </section>

    <section class="category-section">
      <div class="container">
        <div id="categoryButtons" class="category-buttons">
          <div class="loader-container" style="height: 60px;">
            <div class="loader" style="width: 24px; height: 24px; border-width: 3px;"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- ── LISTINGS ─────────────────────────────────────────── -->
    <section class="listings-section section-bg">
      <div class="container" style="max-width: 1200px; margin: 0 auto;">
        <div class="section-header">
          <h3 class="section-title">Featured Listings</h3>
          <button onclick="showFavorites()" class="btn-favorites" id="favoritesBtn">❤️ Favorites</button>
        </div>

        <div id="placesGrid" class="places-grid">
          <div class="loader-container">
            <div class="loader"></div>
          </div>
        </div>
      </div>
    </section>

  </main>

  <footer class="site-footer">
    <p>© 2026 Student Utility Finder | Built for Students</p>
  </footer>

  <script src="script.js"></script>
  <script>
    function toggleDropdown() {
      document.getElementById('dropdownOptions').classList.toggle('show');
    }
    
    function setDistance(val, text) {
      document.getElementById('dropdownSelectedText').innerText = text;
      document.getElementById('dropdownOptions').classList.remove('show');
      
      const sel = document.getElementById('distanceFilter');
      if (sel) {
        sel.value = val;
        sel.dispatchEvent(new Event('change'));
      }
    }

    // Close dropdown on outside click
    document.addEventListener('click', function(e) {
      const dropdown = document.getElementById('customDistanceDropdown');
      if (dropdown && !dropdown.contains(e.target)) {
        document.getElementById('dropdownOptions').classList.remove('show');
      }
    });
  </script>
  </script>
</body>
</html>
